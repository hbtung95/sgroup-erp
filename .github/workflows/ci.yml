name: CI — SGROUP ERP

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-host:
    name: Web Host CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck web host
        run: npx tsc -b core/web-host

      - name: Build web host
        run: npm run build --workspace @sgroup/web-host

  go-services:
    name: Go Services CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Test API gateway
        working-directory: core/api-gateway
        run: go test ./...

      - name: Test HR API
        working-directory: modules/hr/api
        run: go test ./...

      - name: Test Project API
        working-directory: modules/project/api
        run: go test ./...

      - name: Test Sales API
        working-directory: modules/sales/api
        run: go test ./...

      - name: Test CRM API
        working-directory: modules/crm/api
        run: go test ./...

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit workspace dependencies
        run: npm audit --audit-level=high
        continue-on-error: true
