version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sgroup-erp-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: sgroup_erp
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: sgroup-erp-backend
    restart: always
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: 'postgresql://postgres:secretpassword@postgres:5432/sgroup_erp?schema=public'
      PORT: 3000
      JWT_SECRET: 'sgroup-super-secret-key-2026'
    depends_on:
      - postgres

  # Optional: Cloudflared daemon to tunnel localhost:3000 to the public internet securely (replace NOREPLY_TOKEN with actual cloudflare token)
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: sgroup-erp-tunnel
  #   restart: always
  #   command: tunnel run
  #   environment:
  #     - TUNNEL_TOKEN=YOUR_CLOUDFLARE_TUNNEL_TOKEN

volumes:
  pgdata:
