version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sgroup_pg
    environment:
      POSTGRES_USER: erp_admin
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: sgroup_erp
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sgroup_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sgroup_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: erp_admin
      RABBITMQ_DEFAULT_PASS: erp_password
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: sgroup_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # UI Console
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  rabbitmq_data:
  minio_data:
